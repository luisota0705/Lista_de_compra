<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/CSS/index.css">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Minha Lista · Compras</title>
</head>
<body>
    <div class="app-wrapper">
        <!-- Cabeçalho Fixo -->
        <header class="app-header">
            <h1 class="app-title">
                <i class="fas fa-shopping-basket"></i>
                Lista de Compras
            </h1>
            <div class="header-actions">
                <button class="btn-logout" id="logout-btn" title="Sair da conta">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
        </header>

        <!-- Corpo Principal -->
        <main class="app-main">
            <div class="lista-wrapper">
                <ul id="lista" class="lista-itens"></ul>
                
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                    <h3>Sua lista está vazia</h3>
                    <p>Adicione um item abaixo para começar</p>
                </div>
            </div>
        </main>

        <!-- Rodapé -->
        <footer class="app-footer">
            <div class="add-item-container">
                <input type="text" id="item" placeholder="Ex: Pão, Leite, Frutas..." autocomplete="off">
                <button class="btn-add" id="add-btn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => console.log('SW registrado:', registration.scope))
                    .catch(error => console.log('Falha no SW:', error));
            });
        }
    </script>
</body>
</html>
